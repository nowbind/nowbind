# Air config - Go hot reloader (like nodemon for Go)
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./cmd/server"
  bin = "./tmp/server"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "node_modules"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "sql"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[misc]
  clean_on_exit = true

[log]
  time = false
