name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make NowBind better? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like. How would it work? What would the user experience be like?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of NowBind would this affect?
      options:
        - Frontend / UI
        - Backend / API
        - MCP / AI Integration
        - Editor / Writing
        - Social Features
        - Analytics
        - Auth / Security
        - DevOps / Infrastructure
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this hasn't been requested before
          required: true
